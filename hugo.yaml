      about:
        title: "🙋 关于我"
        content: |-
          🎵 现就职于**网易云音乐**，担任语音算法工程师，专注于TTS语音合成、声音转换、AI音乐生成与评估及MV视频自动化。**复旦大学**电子信息专业硕士毕业，在语音合成、声音克隆与音频生成领域有深厚积累。

          💡 曾在**字节跳动**和**哔哩哔哩**实习，深入研究扩散模型无训练加速、CV/NLP应用及ComfyUI插件开发。热衷于用AI技术赋能语音、音乐和音频——让研究成果真正落地为产品。

          🏃 工作之余，热爱飞盘和跑步。音乐上是 **YOASOBI** 和**周杰伦**的粉丝，同时也是推理影视爱好者 🔍。
        skills:
          title: "🛠️ 我最近使用的技术栈："
          items:
            - "TTS"
            - "AI Music Generation"
            - "Diffusion Model"
            - "PyTorch"
            - "AI-MV"
            - "LCM & ADD"
      experience:
        title: "💼 工作经历"
        items:
          - company: "网易云音乐"
            companyUrl: "https://music.163.com/"
            jobs:
              - name: "语音算法工程师"
                date: "2025年6月 - 至今"
                content: |      
                  🎤 主导TTS与声音转换技术研发——持续提升语音合成的自然度与表现力。
                  🎶 构建AI音乐生成算法，探索生成式模型在音乐创作中的落地应用。
                  📊 搭建AI音乐评估体系，让生成音乐的质量更贴合人类审美。
                  🎬 设计端到端Agent，实现歌曲MV全自动化生成。
                  - TTS语音合成与声音转换
                  - AI音乐生成与评估
                  - MV视频生成
          - company: "字节跳动"
            companyUrl: "https://www.bytedance.com/"
            jobs:
              - name: "AIGC算法优化实习生"
                date: "2023年12月 - 2024年8月"
                content: |
                  ⚡ 优化DDPM推理速度，改进蒸馏策略大幅提升生成效率。
                  🔬 深耕Classifier-Free Guidance (CFG)算法，紧跟RCFG、Limited Interval等前沿方案。
                  🚀 独立开发Training-free CFG加速算法——效果对齐下实现20%推理加速。
                  🧩 将自研加速算法集成为ComfyUI插件，面向社区开源交付。
                  - 加速算法研究
                  - CFG算法研究
          - company: "哔哩哔哩"
            companyUrl: "https://www.bilibili.com/"
            jobs: 
              - name: "CV/NLP算法实习生"
                date: "2023年8月 - 2023年11月"
                content: |
                  🎯 训练模型识别低质与引流视频，守护平台内容质量。
                  🤖 设计Prompt驱动的标题分析策略，基于BERT构建视频分类系统。
                  📹 探索AIGC智能视频制作——自动提取新闻资讯，配图配音一键生成。
                  - 视频理解
                  - AIGC智能视频制作
